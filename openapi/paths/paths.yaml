"/transactions/refund-transactions/{parent-transaction-id}":
  post:
    summary: Create a return transaction
    description: |-
      Create a refund transaction linked to an existing invoice. The parent transaction can be a SALE or PURCHASE.
      When the parent is a SALE, the refund type is RETURN. When the parent is a PURCHASE, the refund type is automatically set to PURCHASE_REFUND.
      The resulting transaction will be properly linked to the original transaction.
    operationId: refundTransaction
    parameters:
      - in: path
        name: parent-transaction-id
        required: true
        schema:
          type: string
        description: The unique identifier of the SALE or PURCHASE transaction to generate a return for.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/components.yaml#/components/schemas/CreateRefundRequest"
    responses:
      "200":
        description: Transaction creation response
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    id:
                      type: string
                      description: The unique identifier for the refund transaction.
                      example: 2535af08-a139-4d0c-9827-1651e46dfbcf
                message:
                  type: string
                  example: Successfully created refund transaction.
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/transactions/bulk":
  post:
    summary: Bulk submit transactions
    description: |-
      Submit a file of completed transactions for processing.
      The CSV file must include required fields for SALE, RETURN, and PURCHASE transactions.
      For RETURN and PURCHASE transactions, all line items must have negative total amounts. RETURN transactions should include parent_invoice_id when available.
    operationId: submitBulkTransactions
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              file:
                type: string
                format: binary
                description: The CSV file to upload.
              corporation_id:
                type: string
                description:
                  The unique identifier for a corporation associated with
                  this file.
    responses:
      "200":
        description: Transaction creation response
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  "$ref": "../components/components.yaml#/components/schemas/BulkTransactionMetadata"
                message:
                  type: string
                  example: Successfully uploaded transactions.
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/nexus":
  get:
    summary: Get registration threshold exposure
    description: >-
      Get registration threshold exposure for a corporation. By default, returns US-state-level data.
      Pass `v2=true` to get global jurisdiction-level data covering US, Canada, UK, and EU jurisdictions,
      including support for multiple exposure rules per jurisdiction (for example, EU Union OSS, Non-Union OSS, and IOSS).
    operationId: getNexusDetails
    parameters:
      - name: corporation_id
        in: query
        description: The unique identifier for the corporation to retrieve registration threshold data for.
        required: true
        schema:
          type: string
      - name: v2
        in: query
        description: >-
          Set to `true` to use the global registration threshold engine. When enabled, the response
          uses a `jurisdictions` array with expanded fields including `jurisdiction_id`, `exposure_type`,
          `exposure_rule_id`, `subdivision`, and `currency`. When omitted or `false`,
          the legacy response format with a `states` array is returned.
        required: false
        schema:
          type: string
          enum:
            - "true"
            - "false"
    responses:
      "200":
        description: Registration threshold exposure data
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  title: Default response
                  description: Returned when `v2` is not set or `false`.
                  properties:
                    data:
                      "$ref": "../components/components.yaml#/components/schemas/NexusResponse"
                    message:
                      type: string
                      example: Successfully fetched nexus.
                - type: object
                  title: V2 response
                  description: Returned when `v2=true`.
                  properties:
                    data:
                      "$ref": "../components/components.yaml#/components/schemas/NexusV2Response"
                    message:
                      type: string
                      example: Successfully fetched nexus.
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/filings":
  get:
    summary: List filings
    description: >-
      List state and local sales tax filings for a corporation, filtered by query.
      Pass `v2=true` to use the V2 filings path, which supports additional
      filters (such as `registration_tax_type_id`, `jurisdiction_ids`,
      `filing_statuses`, `filing_frequencies`, `from_due_date`, and
      `to_due_date`) and opt-in expansions via the `extend` query parameter.
    operationId: listFilings
    parameters:
      - name: corporation_id
        in: query
        description:
          The unique identifier of the corporation for which to retrieve
          data.
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        description: Cursor for pagination
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Number of items to return per page
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
      - name: v2
        in: query
        description: >-
          Set to `true` to use the V2 filings path, which returns V2 content
          metadata (such as `registration_tax_type_id`, `jurisdiction_name`,
          `jurisdiction_type`, and `filing_content_id`) and enables the
          additional filters and `extend` parameter documented below. When
          omitted or `false`, the legacy filings response is returned.
        required: false
        schema:
          type: string
          enum:
            - "true"
            - "false"
      - name: extend
        in: query
        description: >-
          Opt-in expansion for the V2 path (requires `v2=true`). Comma-separated
          list of expansion keys. The only supported value today is
          `filing_contribution`, which inlines the computed tax-return box
          contributions on each filing via a `contributions` array. When the
          parameter is omitted, the `contributions` field is not included in
          the response. Unknown values return a `400`.
        required: false
        schema:
          type: string
          example: "filing_contribution"
      - name: from_due_date
        in: query
        description: >-
          V2 path only (`v2=true`). ISO 8601 date string. Returns only filings
          whose due date is on or after this value.
        required: false
        schema:
          type: string
          format: date
      - name: to_due_date
        in: query
        description: >-
          V2 path only (`v2=true`). ISO 8601 date string. Returns only filings
          whose due date is on or before this value.
        required: false
        schema:
          type: string
          format: date
      - name: registration_tax_type_id
        in: query
        description: >-
          V2 path only (`v2=true`). Filter by V2 registration tax type content
          identifier (e.g., `REG_STATE_CEN_06_RST`).
        required: false
        schema:
          type: string
      - name: jurisdiction_ids
        in: query
        description: >-
          V2 path only (`v2=true`). Comma-separated list of Commenda
          jurisdiction identifiers to filter by. Maximum 100 values.
        required: false
        schema:
          type: string
          example: "COUNTRY_DE_3018,STATE_CEN_06"
      - name: filing_statuses
        in: query
        description: >-
          V2 path only (`v2=true`). Comma-separated list of filing statuses to
          filter by. Maximum 100 values.
        required: false
        schema:
          type: string
      - name: filing_frequencies
        in: query
        description: >-
          V2 path only (`v2=true`). Comma-separated list of filing frequencies
          to filter by. Maximum 100 values.
        required: false
        schema:
          type: string
    responses:
      "200":
        description: Filing info for all states
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    filings:
                      type: array
                      items:
                        "$ref": "../components/components.yaml#/components/schemas/FilingsForGetAll"
                    cursor:
                      type: string
                      description: Pagination cursor for the next set of results
                message:
                  type: string
                  example: Successfully fetched filings.
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/filings/{id}":
  get:
    summary: Get one filing
    description: Retrieve one filing by its id
    operationId: getFiling
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: The unique identifier of the transaction to fetch.
