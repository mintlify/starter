        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
      "404":
        description: No address requirements found for the specified country
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/transactions":
  post:
