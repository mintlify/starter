    description: Submit a completed transaction for processing and filing
    operationId: submitTransaction
    requestBody:
      required: true
      content:
        application/json:
          schema:
            "$ref": "../components/components.yaml#/components/schemas/CreateTaxTransactionRequest"
    responses:
