      "400":
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
  get:
    summary: List transactions
    description: List all transactions that match this query
    operationId: listTransactions
    parameters:
      - name: corporation_id
        in: query
        description:
          The unique identifier of the corporation for which to retrieve
          data.
        required: true
        schema:
          type: string
      - name: cursor
        in: query
        description: Cursor for pagination
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Number of items to return per page
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
      - name: type
        in: query
        description: Filter by a single transaction type. Superseded by `types` if both are provided.
        required: false
        schema:
          "$ref": "../components/tax-transactions.yaml#/schemas/transaction_type"
      - name: types
        in: query
        description: |-
          Filter by one or more transaction types. Takes priority over `type` when both are provided.
          If neither `types` nor `type` is specified, defaults to `[SALE, REFUND, RETURN]` — PURCHASE and PURCHASE_REFUND are excluded unless explicitly requested.
        required: false
        schema:
          type: array
          items:
            "$ref": "../components/tax-transactions.yaml#/schemas/transaction_type"
    responses:
      "200":
        description: List of transactions
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    transactions:
                      type: array
                      items:
                        "$ref": "../components/components.yaml#/components/schemas/TaxTransactionResponse"
                    cursor:
                      type: string
                      description: Pagination cursor for the next set of results
                message:
                  type: string
                  example: Successfully fetched transactions.
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              "$ref": "../components/components.yaml#/components/schemas/Error"
"/transactions/{id}":
  get:
    summary: Get one transaction
