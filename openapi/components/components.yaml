    filing_frequency:
      type: string
      enum:
        - MONTHLY
        - QUARTERLY
        - SEMI_ANNUALLY
        - ANNUAL_CALENDAR_YEAR
        - FISCAL_YEAR
        - MONTHLY_ACCELERATED_PREPAY_EARLY
        - QUARTERLY_PREPAY_MONTHLY
        - ANNUAL_RECONCILIATION
        - BI_MONTHLY
        - TRI_ANNUALLY
        - QUARTERLY_FEB
        - QUARTERLY_MAR
      description: >-
        How often the business is required to submit tax returns.
        V1 registrations typically use MONTHLY, QUARTERLY, SEMI_ANNUALLY, or ANNUAL_CALENDAR_YEAR.
        V2 registrations may use additional frequencies such as ANNUAL_RECONCILIATION
        (for jurisdictions requiring a separate annual reconciliation filing alongside
        periodic returns) or region-specific variants like QUARTERLY_FEB and QUARTERLY_MAR.
    Tax_filing_status:
      type: string
      enum:
        - SCHEDULED
        - ACCRUING
        - ACTIVE
        - FILED
        - OVERDUE
      description: >-
        Current status of the filing. SCHEDULED means the filing has been created
        but the tax period has not yet started. ACCRUING means transactions are being
        collected for this period. ACTIVE means the filing is ready for review and
        submission. FILED means the return has been submitted. OVERDUE means the
        due date has passed without filing.
    FilingsForGetAll:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the filing.
        corporation_id:
          type: string
          description:
            The unique identifier for a corporation associated with this
            filing.
        form_title:
          type: string
          description: Name of the tax return form for this filing (e.g., "Sales and Use Tax Return").
        description:
          type: string
          description: Additional details about the filing, such as filing variant or deadline type.
        country:
          "$ref": "#/components/schemas/Country"
        country_specific_details:
          "$ref": "./registrations.yaml#/schemas/CountrySpecificDetails"
        registration_tax_type_id:
          type: string
          nullable: true
          description: >-
            The V2 registration content identifier linking this filing to a specific
            registration tax type. Present for filings created via the V2 path; null
            for V1 filings.
          example: "REG_STATE_CEN_06_RST"
        jurisdiction_name:
          type: string
          nullable: true
          description: >-
            Human-readable jurisdiction name derived from V2 registration content
             (e.g., "California", "Germany"). Present for V2 filings; null for V1 filings.
        jurisdiction_type:
          type: string
          nullable: true
          description: >-
            Type of jurisdiction for this filing. Present for V2 filings; null for V1 filings.
          enum:
            - STATE_OR_PROVINCE
            - COUNTRY
            - TRADEBLOC
            - CITY_OR_COUNTY
        filing_content_id:
          type: string
          nullable: true
          description: >-
            Content identifier linking this filing to its filing calendar entry and
            contribution box rules. Present for V2 filings with content-driven
            calendars; null for V1 filings.
          example: "FC_DE_3001_VAT"
        frequency:
          "$ref": "#/components/schemas/filing_frequency"
        period_start_date:
          type: string
          format: date
          description:
            ISO 8601 date string, identifying the start date of the period
            period for which the sales tax is being filed (e.g., '2024-09-01' for September
            2024). For a quarter 1 filing where the fiscal year starts in March, the
            period_start_date will be 2024-03-01 and frequency will be QUARTERLY.
        reporting_period_start_date:
          type: string
          format: date
          description: >-
            Start date of the reporting period, which may differ from the tax period.
            For example, a quarterly filing may have a tax period of Jan–Mar but a
            reporting deadline that references a different window.
        reporting_period_end_date:
          type: string
          format: date
          description: End date of the reporting period.
        due_date:
          type: string
          format: date
          description:
            ISO 8601 date string, identifying the date when by which the
            filing must be submitted.
        filing_status:
          "$ref": "#/components/schemas/Tax_filing_status"
        filed_on:
          type: string
          format: date
          description: Date when the taxes were filed with the state, in ISO 8601 format.
        registration_id:
          type: string
          description:
            The unique identifier for the tax registration associated with
            this filing.
        total_tax_filed:
          type: number
          description:
            Total amount of sales tax filed with various jurisdictions for
            this period. May differ slightly from the total tax collected.
          example: 135.92
        payment_details:
          type: object
          properties:
            amount_due:
              type: number
              description: Total amount due for this filing.
            payment_status:
              type: string
              enum:
                - PENDING
                - COMPLETED
                - FAILED
              description: Status of the payment.
            failure_details:
              type: object
              description:
                This object will be populated if the payment fails for any
                reason.
              properties:
                failed_at:
                  type: string
                  format: date
                  description:
                    ISO 8601 date string, identifying the date when the payment
                    failed.
                reason:
                  type: string
                  description: Specific information why the payment failed.
        contributions:
          type: array
          nullable: true
          description: >-
            Computed tax-return box contributions for this filing. Only
            populated on the V2 list path (`v2=true`) when called with
            `extend=filing_contribution`. When the expansion is not
            requested, this field is omitted from the response. An empty
            array means the filing has no computed contributions yet.
          items:
            "$ref": "../components/filings.yaml#/schemas/FilingContribution"
    FilingsGet:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the filing.
        corporation_id:
