    CreateWebhookRequest:
      type: object
      required:
        - api_version
        - url
        - key
        - status
        - topics
      properties:
        api_version:
          type: string
          description:
            The version of the API for which you registered the webhook.
            This helps to maintain backward compatibility. If in newer versions the
            event payload is changed, your webhook will keep receiving the payload from
            this api version. This will be 'v1.0' for now and we will come up with more
            versions and a changelog later.
        name:
          type: string
          description: Optional name to define the purpose of the webhook.
        topics:
          type: array
          items:
            type: string
            enum:
              - REGISTRATIONS.EXISTING.VALIDATION_FAILED
              - REGISTRATIONS.EXISTING.VALIDATION_SUCCEEDED
          description:
            An array of topics to listen to. When any of these topics are
            triggered, the webhook will be pinged.
        url:
          type: string
          description:
            Your webhook url that will be hit once an event happens. Only
            HTTPS urls are allowed.
        key:
          type: string
          description:
            Secure string provided by the user. It will be used during HMCA
            process to keep the event payloads secure. Make sure to keep it safe as
            you will need it during validating event payloads. This key won't be returned
            back by any other endpoint.
        status:
          type: string
          enum:
            - ENABLED
            - DISABLED
          description:
            If the webhook is active or not. If a webhook is disabled it
            won't be called when a topic is triggered.
    CreateWebhookResponse:
      type: object
      properties:
        id:
          type: string
          description:
            The unique identifier for this webhook. You will need this if
