          description: Name of the tax return form for this filing (e.g., "Sales and Use Tax Return").
        description:
          type: string
          description: Additional details about the filing, such as filing variant or deadline type.
        country:
          "$ref": "#/components/schemas/Country"
        country_specific_details:
          "$ref": "./registrations.yaml#/schemas/CountrySpecificDetails"
        registration_tax_type_id:
          type: string
          nullable: true
          description: >-
            The V2 registration content identifier linking this filing to a specific
            registration tax type. Present for filings created via the V2 path; null
            for V1 filings.
          example: "REG_STATE_CEN_06_RST"
        jurisdiction_name:
          type: string
          nullable: true
          description: >-
            Human-readable jurisdiction name derived from V2 registration content
            (e.g., "California", "Germany"). Present for V2 filings; null for V1 filings.
        jurisdiction_type:
          type: string
          nullable: true
          description: >-
            Type of jurisdiction for this filing. Present for V2 filings; null for V1 filings.
          enum:
            - STATE_OR_PROVINCE
            - COUNTRY
            - TRADEBLOC
            - CITY_OR_COUNTY
        filing_content_id:
          type: string
          nullable: true
          description: >-
            Content identifier linking this filing to its filing calendar entry and
            contribution box rules. Present for V2 filings with content-driven
            calendars; null for V1 filings.
          example: "FC_DE_3001_VAT"
        frequency:
          "$ref": "#/components/schemas/filing_frequency"
        period_start_date:
          type: string
          format: date
          description:
            ISO 8601 date string, identifying the start date of the period
            period for which the sales tax is being filed (e.g., '2024-09-01' for September
            2024). For a quarter 1 filing where the fiscal year starts in March, the
            period_start_date will be 2024-03-01 and frequency will be QUARTERLY.
        reporting_period_start_date:
          type: string
          format: date
          description: >-
            Start date of the reporting period, which may differ from the tax period.
        reporting_period_end_date:
          type: string
          format: date
          description: End date of the reporting period.
        due_date:
          type: string
          format: date
          description:
            ISO 8601 date string, identifying the date when by which the
            filing must be submitted.
        filing_status:
          "$ref": "#/components/schemas/Tax_filing_status"
        filed_on:
          type: string
          format: date
          description: Date when the taxes were filed with the state, in ISO 8601 format.
        registration_id:
          type: string
          description:
            The unique identifier for the tax registration associated with
            this filing.
        total_tax_filed:
          type: number
          description:
            Total amount of sales tax filed with various jurisdictions for
            this period. May differ slightly from the total tax collected.
          example: 135.92
        sales_details:
          type: object
          properties:
            total_sales:
              type: number
              description: Total sales amount for the filing period.
              example: 12345.91
            taxable_sales:
              type: number
              description:
                Total sales amount that was subject to sales tax for the
                filing period.
              example: 12345.91
            sales_tax_collected:
              type: number
              description: Total sales tax collected during the period.
              example: 771.62
        payment_details:
          type: object
          properties:
            amount_due:
              type: number
              description: Total amount due for this filing.
              example: 771.62
            payment_status:
              type: string
              enum:
                - PENDING
                - COMPLETED
                - FAILED
              description: Status of the payment.
            failure_details:
              type: object
              description:
                This object will be populated if the payment fails for any
                reason.
              properties:
                failed_at:
                  type: string
                  description:
                    ISO 8601 date string, identifying the date when the payment
                    failed.
                reason:
                  type: string
                  description: Specific information why the payment failed.
    RegistrationGet:
      $ref: "./registrations.yaml#/schemas/RegistrationGet"
    Country:
      type: string
      example: US
      description: "ISO 3166 2-letter country code. Ex: US, IN, GB."
    Currency:
      type: string
      example: USD
      description: ISO 4217 alpha-3 currency code for the transaction.
    RegistrationPost:
      $ref: "./registrations.yaml#/schemas/RegistrationPost"
    RegistrationIdPost:
      $ref: "./registrations.yaml#/schemas/RegistrationIdPost"
    NexusResponse:
      $ref: "./nexus.yaml#/schemas/NexusResponse"
    NexusV2Response:
      $ref: "./nexus.yaml#/schemas/NexusV2Response"
    JurisdictionExposure:
      $ref: "./nexus.yaml#/schemas/JurisdictionExposure"
    NexusRuleV2:
      $ref: "./nexus.yaml#/schemas/NexusRuleV2"
    CalculationObjectV2:
      $ref: "./nexus.yaml#/schemas/CalculationObjectV2"
    CreateExemptionCertificateRequest:
      $ref: "./exemption-certificates.yaml#/schemas/CreateExemptionCertificateRequest"
    ExemptionCertificateResponse:
      $ref: "./exemption-certificates.yaml#/schemas/ExemptionCertificateResponse"
    FileInfo:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the file
        name:
          type: string
          example: example.pdf
          description: File name.
        size:
          type: number
          description: File size (bytes)
          example: 102400
        corporation_id:
          type: string
          description:
            The unique identifier for a corporation associated with this
            file.
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              description: "Specific Error type. Example: CLIENT_INVALID_REQUEST_BODY."
              example: CLIENT_INVALID_REQUEST_BODY
            doc_url:
              type: string
              description:
                "A link to the docs with details about this error. Example:
                https://sales-tax-docs.commenda.io/"
              example: https://sales-tax-docs.commenda.io/
            title:
              type: string
              description:
                "A short title describing the error. Example: Missing query
                parameters."
              example: Failed to validate the request body
            detail:
              type: string
              description:
                A json string with a description on how to fix the error.
                Example {"description":"Please pass in a valid corporation_id"}
            status:
              type: number
              description:
                "The status code. It should be the same as the HTTP protocol
                status code. Example: 200"
              example: 400
            instance:
              type: string
              description: "The relative path that was hit by the user. Example: /api/v1/corporations/1"
            Errors:
              type: array
              items:
                type: object
                properties:
                  details:
                    type: string
                    description: More details on how to solve this particular error.
                  pointer:
                    type: string
                    description:
                      Relative reference to missing or invalid piece of passed
                      information.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    xApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
