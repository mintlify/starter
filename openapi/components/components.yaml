        url:
          type: string
          description:
            Your webhook url that will be hit once a topic is triggered.
            Only https:// urls will work.
          example: https://bruno-simon.com/
        key:
          type: string
          description:
            Use for signing the event payloads. All the event payloads will
            be signed using this key. Make sure to keep it safe as you will need it
            during validating event payloads.
          example: couabowugowubfvow2efgofqpifhdiubvafobafou2ee
        status:
          type: string
          enum:
            - ENABLED
            - DISABLED
          description:
            If the webhook is active or not. If a webhook id disabled it
            won't be called when a topic is triggered.
        created_at:
          type: number
          description: Timestamp in UTC when this webhook was created.
          example: 1727284490
