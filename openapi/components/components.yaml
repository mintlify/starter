    CustomsDutyCalculationRequest:
      type: object
      required:
        - corporation_id
        - invoice_currency
        - subtotal
        - origin_country
        - destination_country
        - line_items
      properties:
        corporation_id:
          type: string
          description:
            The unique identifier for the corporation to calculate an import
            duty rate for.
          example: b6d009b0-d174-463f-b030-94643c28e209
        invoice_currency:
          "$ref": "#/components/schemas/Currency"
        subtotal:
          type: number
          example: 10.99
          description: Total amount before tax, shipping, handling, and discounts.
        discount:
          type: number
          example: 0.99
          description: Total discount amount applied to the subtotal.
        shipping_and_handling:
          type: number
          example: 0
          description: Total shipping and handling charges.
        origin_country:
          "$ref": "#/components/schemas/Country"
        destination_country:
          "$ref": "#/components/schemas/Country"
        line_items:
          type: object
          required:
            - amount
            - quantity
          properties:
            items:
              description:
                Array of line items representing individual products in the
                shipment. For each line item, pass exactly one of `customs_code` or
                the `product_id`. If the `product_id` is passed, the `customs_code`
                will be fetched from the product itself.
              type: array
              items:
                type: object
                properties:
                  amount:
                    type: number
                    description:
                      Total price for the line item, including any discounts
                      and shipping and handling costs.
                  quantity:
                    type: number
                    description: Quantity of units purchased.
                  # customs_code:
                  #   "$ref": "#/components/schemas/customs_code"
                  product_id:
                    type: string
                    description:
                      The unique identifier for the product getting sold
                      in this line item.
