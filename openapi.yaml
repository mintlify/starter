    PortalFieldsResponse:
      type: object
      properties:
        forms:
          type: array
          items:
            type: object
            properties:
              registration_content_id:
                type: string
              jurisdiction_id:
                type: string
              jurisdiction_name:
                type: string
              tax_type:
                type: string
              portals:
                type: array
                items:
                  type: object
